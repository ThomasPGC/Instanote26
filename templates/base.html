<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Instanote{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Instanote — Calcul charpente</a>
    <a href="/calcul" class="btn btn-outline-light btn-sm">Calcul portique</a>
    {% if request.state.user %}
    <span class="navbar-text text-light ms-2">Mon compte — {{ request.state.user.email }}</span>
    <a href="/auth/logout" class="btn btn-outline-light btn-sm ms-2">Déconnexion</a>
    {% else %}
    <a href="/auth/login" class="btn btn-outline-light btn-sm ms-2">Connexion</a>
    <a href="/auth/register" class="btn btn-outline-light btn-sm ms-2">Inscription</a>
    {% endif %}
</nav>
<div class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</div>
</body>
</html>
