{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <h2 class="mb-4">Mot de passe oublié</h2>

    {% if sent %}
    <div class="alert alert-info">
      Si un compte existe avec cette adresse, un email de réinitialisation vient d'être envoyé.
    </div>
    {% endif %}

    <form method="post" action="/auth/forgot-password">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary w-100">Envoyer le lien de réinitialisation</button>
    </form>

    <p class="mt-3 text-center">
      <a href="/auth/login">Retour à la connexion</a>
    </p>
  </div>
</div>
{% endblock %}
