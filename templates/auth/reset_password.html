{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <h2 class="mb-4">Nouveau mot de passe</h2>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/reset-password">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="mb-3">
        <label for="password" class="form-label">Nouveau mot de passe</label>
        <input type="password" class="form-control" id="password" name="password" required minlength="8" autofocus>
      </div>
      <button type="submit" class="btn btn-primary w-100">Réinitialiser le mot de passe</button>
    </form>
  </div>
</div>
{% endblock %}
